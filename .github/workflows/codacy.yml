name: Codacy Security Scan

on:
  push:
    branches: [ "master","dev" ]
  pull_request:
    branches: [ "dev", "master" ]
  schedule:
    - cron: '22 12 * * 5'

permissions:
  contents: read

jobs:
  codacy-security-scan:
    permissions:
      contents: read # for actions/checkout to fetch code
      security-events: write # for github/codeql-action/upload-sarif to upload SARIF results
    name: Codacy Security Scan
    runs-on: ubuntu-latest
    steps:
      # Checkout the repository to the GitHub Actions runner
      - name: Checkout code
        uses: actions/checkout@v6

      # Execute Codacy Analysis CLI and generate a SARIF output with the security issues identified during the analysis
      - name: Run Codacy Analysis CLI
        uses: codacy/codacy-analysis-cli-action@master
        with:
          # Check https://github.com/codacy/codacy-analysis-cli#project-token to get your project token from your Codacy repository
          # You can also omit the token and run the tools that support default configurations
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          verbose: true
          output: results.sarif
          format: sarif
          # Adjust severity of non-security issues
          gh-code-scanning-compat: true
          # Force 0 exit code to allow SARIF file generation
          # This will handover control about PR rejection to the GitHub side
          max-allowed-issues: 2147483647

      # Debug: print number of runs and tool names in the generated SARIF
      - name: Debug SARIF runs
        run: |
          echo "Number of runs: $(jq '.runs | length' results.sarif)"
          jq -r '.runs[].tool.driver.name' results.sarif

      # Split results.sarif into one file per run and upload each with a unique category.
      # This avoids the "multiple runs in a single SARIF for the same category" error.
      - name: Split SARIF and upload per tool
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          count=$(jq '.runs | length' results.sarif)
          echo "Total runs to upload: $count"
          for i in $(seq 0 $((count - 1))); do
            tool=$(jq -r ".runs[$i].tool.driver.name" results.sarif)
            safe_tool=$(echo "$tool" | tr '[:upper:]' '[:lower:]' | tr ' /\\' '---')
            category="codacy-${safe_tool}"
            outfile="sarif-run-${i}.sarif"
            jq "{version: .version, \"\$schema\": .\"\$schema\", runs: [.runs[$i]]}" results.sarif > "$outfile"
            echo "Uploading $outfile (tool: $tool, category: $category)"
            encoded=$(gzip -c "$outfile" | base64 -w 0)
            response=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST \
              -H "Authorization: token ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/code-scanning/sarifs" \
              -d "{\"commit_sha\":\"${{ github.sha }}\",\"ref\":\"${{ github.ref }}\",\"sarif\":\"${encoded}\",\"tool_name\":\"${tool}\",\"category\":\"${category}\"}")
            http_status=$(echo "$response" | grep "HTTP_STATUS:" | cut -d: -f2)
            body=$(echo "$response" | sed '/HTTP_STATUS:/d')
            echo "HTTP status for run $i ($tool): $http_status"
            if [ "$http_status" -lt 200 ] || [ "$http_status" -ge 300 ]; then
              echo "Upload failed. Response body: $body"
              exit 1
            fi
          done
